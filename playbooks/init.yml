---
- name: Initialize system
  hosts: localhost

  vars:
    # Used in changed_when to avoid marking the install task as changed if the extension is already installed.
    # 2>/dev/null || echo "" handles the first run where gext isn't installed yet
    # (vars are evaluated before tasks run, so gext may not exist at this point)
    installed_gnome_extensions: "{{ lookup('pipe', '~/.local/bin/gext list 2>/dev/null || echo \"\"') }}"
    user: "{{ ansible_facts['user_id'] }}"
    base_dir: "/home/{{ user }}/Repos"

  pre_tasks:
    # base-devel (gcc, make, etc.) is required by makepkg to build paru from AUR
    - name: Install base-devel
      community.general.pacman:
        name:
          - base-devel
        state: present
      become: true

    # AUR helpers cannot run as root, so we create a dedicated aur_builder user
    # with passwordless sudo for pacman to allow makepkg to work in Ansible
    - name: Create aur_builder user
      ansible.builtin.user:
        name: aur_builder
        create_home: yes
      become: true

    - name: Create aur_builder Ansible tmp directory
      ansible.builtin.file:
        path: /home/aur_builder/.ansible/tmp
        state: directory
        mode: "0700"
        owner: aur_builder
      become: true

    - name: Allow aur_builder passwordless sudo for pacman
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/aur_builder
        state: present
        line: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        validate: /usr/sbin/visudo -cf %s
        create: yes
      become: true

    - name: Clone paru AUR helper
      ansible.builtin.git:
        repo: https://aur.archlinux.org/paru.git
        dest: /tmp/paru
        depth: 1
      become: true
      become_user: aur_builder

    - name: Build and install paru
      ansible.builtin.command:
        cmd: makepkg -si --noconfirm
        chdir: /tmp/paru
        creates: /usr/bin/paru
      become: true
      become_user: aur_builder

  tasks:
    - name: Install pacman packages
      community.general.pacman:
        name:
          - less
          - github-cli
          - ghostty
          - neovim
          - docker
          - zsh
          - nvidia-container-toolkit
          - python
          - python-pipx
        state: present
      become: true

    - name: Install AUR packages
      kewlfft.aur.aur:
        name:
          - 1password
          - zen-browser-bin
        use: paru
        state: present
      become: true
      become_user: aur_builder

    - name: Install Oh-My-Zsh
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: /home/{{ user }}/.oh-my-zsh
        depth: 1

    # Docker daemon runs as root by default — adding the user to the docker group
    # allows running docker commands without sudo. Arch doesn't do this automatically.
    - name: Create docker group
      ansible.builtin.group:
        name: docker
        state: present
      become: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ user }}"
        groups: docker
        append: yes
      become: true

    # Arch enforces PEP 668, blocking system-wide and --user pip installs.
    # pipx is the recommended alternative for Python applications on Arch.
    # (nobara uses pip --user, which Fedora's looser PEP 668 enforcement allows)
    - name: Install gnome-extensions-cli
      community.general.pipx:
        name: gnome-extensions-cli
        state: present

    # Permanently adds ~/.local/bin to PATH in your shell config so
    # pipx-installed tools like gext are available in future terminal sessions.
    - name: Add ~/.local/bin to PATH via pipx ensurepath
      ansible.builtin.command:
        cmd: pipx ensurepath
      changed_when: false

    - name: Install GNOME extensions
      ansible.builtin.command:
        cmd: ~/.local/bin/gext --filesystem install "{{ item }}"
      loop:
        - gsconnect@andyholmes.github.io
      changed_when: item not in installed_gnome_extensions

    - name: Swap Caps Lock and Escape
      community.general.dconf:
        key: "/org/gnome/desktop/input-sources/xkb-options"
        value: "['caps:escape']"
        state: present

    - name: Create autostart directory
      ansible.builtin.file:
        path: "/home/{{ user }}/.config/autostart"
        state: directory
        mode: "0755"

    - name: Autostart 1Password
      ansible.builtin.copy:
        src: "{{ base_dir }}/arch-setup/templates/1password.desktop"
        dest: "/home/{{ user }}/.config/autostart/1password.desktop"

  post_tasks:
    - name: Start systemd services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      become: true
      loop:
        - docker.service
        - sshd.service

    - name: Change user shell to Zsh
      ansible.builtin.user:
        name: "{{ user }}"
        shell: /bin/zsh
      become: true

    - name: Verify NVIDIA Container Toolkit installation
      ansible.builtin.command:
        cmd: docker run --rm --gpus all nvidia/cuda:12.6.3-cudnn-runtime-ubuntu24.04 nvidia-smi
      register: nvidia_test
      changed_when: false
      become: true

    - name: Display final message
      vars:
        msg: |
          ============================================================================================

          Setup is complete. A reboot is recommended:
          1. For GNOME extension changes to take effect, you must at least log out and log back in.
          2. For Docker group membership changes to take effect, either reboot or run `newgrp docker`.

          ============================================================================================

          NVIDIA Container Toolkit test results:
          {{ nvidia_test.stdout if nvidia_test.stdout is defined else 'Test failed' }}

          ============================================================================================
      ansible.builtin.debug:
        msg: "{{ msg.split('\n') }}"
