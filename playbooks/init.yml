---
- name: Initialize system
  hosts: localhost

  vars:
    installed_gnome_extensions: "{{ lookup('pipe', 'gext list') }}"
    user: "{{ ansible_user_id }}"
    base_dir: "/home/{{ user }}/Repos"

  pre_tasks:
    # base-devel (gcc, make, etc.) is required by makepkg to build paru from AUR
    - name: Install base-devel and git
      community.general.pacman:
        name:
          - base-devel
        state: present
      become: true

    - name: Clone paru AUR helper
      ansible.builtin.git:
        repo: https://aur.archlinux.org/paru.git
        dest: /tmp/paru
        depth: 1

    - name: Build and install paru
      ansible.builtin.command:
        cmd: makepkg -si --noconfirm
        chdir: /tmp/paru
        creates: /usr/bin/paru

  tasks:
    - name: Install pacman packages
      community.general.pacman:
        name:
          - less
          - github-cli
          - ghostty
          - neovim
          - docker
          - zsh
          - nvidia-container-toolkit
        state: present
      become: true

    - name: Install AUR packages
      community.general.aur:
        name:
          - 1password
          - zen-browser-bin
        use: paru
        state: present

    - name: Install Oh-My-Zsh
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: /home/{{ user }}/.oh-my-zsh
        depth: 1

    # Docker daemon runs as root by default — adding the user to the docker group
    # allows running docker commands without sudo. Arch doesn't do this automatically.
    - name: Create docker group
      ansible.builtin.group:
        name: docker
        state: present
      become: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ user }}"
        groups: docker
        append: yes
      become: true

    - name: Install gnome-extensions-cli
      ansible.builtin.pip:
        name: gnome-extensions-cli
        extra_args: --user --upgrade

    - name: Install GNOME extensions
      ansible.builtin.command:
        cmd: gext --filesystem install "{{ item }}"
      loop:
        - gsconnect@andyholmes.github.io
      changed_when: item not in installed_gnome_extensions

    - name: Swap Caps Lock and Escape
      community.general.dconf:
        key: "/org/gnome/desktop/input-sources/xkb-options"
        value: "['caps:escape']"
        state: present

    - name: Create autostart directory
      ansible.builtin.file:
        path: "/home/{{ user }}/.config/autostart"
        state: directory
        mode: '0755'

    - name: Autostart 1Password
      ansible.builtin.copy:
        src: "{{ base_dir }}/arch-setup/templates/1password.desktop"
        dest: "/home/{{ user }}/.config/autostart/1password.desktop"

  post_tasks:
    - name: Start systemd services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      become: true
      loop:
        - docker.service
        - sshd.service

    - name: Change user shell to Zsh
      ansible.builtin.user:
        name: "{{ user }}"
        shell: /bin/zsh
      become: true

    - name: Verify NVIDIA Container Toolkit installation
      ansible.builtin.command:
        cmd: docker run --rm --gpus all nvidia/cuda:12.6.3-cudnn-runtime-ubuntu24.04 nvidia-smi
      register: nvidia_test
      changed_when: false
      become: true

    - name: Display final message
      vars:
        msg: |
             ============================================================================================

             Setup is complete. A reboot is recommended:
             1. For GNOME extension changes to take effect, you must at least log out and log back in.
             2. For Docker group membership changes to take effect, either reboot or run `newgrp docker`.

             ============================================================================================

             NVIDIA Container Toolkit test results:
             {{ nvidia_test.stdout if nvidia_test.stdout is defined else 'Test failed' }}

             ============================================================================================
      ansible.builtin.debug:
        msg: "{{ msg.split('\n') }}"
