---
- name: Configure SSH server
  hosts: localhost

  vars:
    ssh_public_key: "{{ lookup('community.general.onepassword', 'da-arch', field='public key', vault='Personal') }}"

  tasks:
    - name: Add SSH public key to authorized_keys
      ansible.builtin.authorized_key:
        user: "{{ user }}"
        key: "{{ ssh_public_key }}"
        state: present

    - name: Configure sshd
      ansible.builtin.template:
        src: "{{ base_dir }}/arch-setup/templates/sshd_config.j2"
        dest: /etc/ssh/sshd_config
        owner: root
        group: root
        mode: '0600'
        backup: yes
      become: true
      notify: Restart sshd

    - name: Enable and start sshd
      ansible.builtin.systemd:
        name: sshd
        state: started
        enabled: true
      become: true

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
      become: true
